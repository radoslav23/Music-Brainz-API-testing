on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
  
jobs:
  postman-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Postman CLI (Windows)
  run: |
    powershell -Command "iwr https://dl-cli.pstmn.io/install/windows.ps1 -UseBasicParsing | iex"

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run MusicBrainz Test Collection
        run: postman collection run 4784767-81c74bdd-5f64-4631-b460-a74cf6fd5707
